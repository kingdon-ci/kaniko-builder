# hephy-builder: Curl Utility Build Configuration  
# Bootstrap component for hephy-builder pipeline infrastructure
# LOCAL MODE: Self-contained build for reliable bootstrap dependency
use_local_context: true

# Path to Dockerfile relative to this directory
dockerfile_path: Dockerfile

# No specific target needed for this simple image
target: ""

# Build context path (this directory)
context_path: .

# Build arguments to pass to Kaniko
build_args: []

# Architectures to build (single-arch for now to test pipeline)
platforms:
  - linux/amd64
  - linux/arm64

# Tags to apply (in addition to date-commit tag)
# Format: {directory-name}-{tag}
additional_tags:
  - latest
  - test
