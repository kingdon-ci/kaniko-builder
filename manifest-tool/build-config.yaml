# hephy-builder: Manifest Tool Build Configuration
# Multi-architecture manifest creation for hephy-builder backends
# SELF-CONTAINED: No external dependencies for reliable operation
use_local_context: true

# Path to Dockerfile relative to this directory
dockerfile_path: Dockerfile

# No specific target needed
target: ""

# Build context path (this directory)
context_path: .

# No build arguments needed (self-contained)
build_args: []

# Architectures to build (both needed for multi-arch manifests)
platforms:
  - linux/amd64
  - linux/arm64

# Tags to apply
additional_tags:
  - latest
