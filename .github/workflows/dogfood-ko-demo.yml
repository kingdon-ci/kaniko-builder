# Dogfood Test: Build hephy-builder Ko Demo with hephy-builder
# 
# This workflow demonstrates hephy-builder building itself using the Ko backend.
# It validates:
# - Ko backend works correctly
# - Native multi-arch builds function
# - Build performance improvements
# - Self-hosting capability

name: dogfood-ko-demo

on:
  push:
    paths:
      - 'ko-test/**'
      - '.github/workflows/dogfood-ko-demo.yml'
  pull_request:
    paths:
      - 'ko-test/**'
      - '.github/workflows/dogfood-ko-demo.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository }}

jobs:
  dogfood-build:
    name: Dogfood - Ko Backend Test
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Ko
      uses: ko-build/setup-ko@v0.7
    
    - name: Log in to Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Ko Backend Dogfood Build
      run: |
        echo "🚀 Dogfood Test: Building hephy-builder Ko demo with Ko backend"
        echo "============================================================="
        
        cd ko-test
        
        # Extract Ko configuration from build-config.yaml
        KO_IMPORT_PATH=$(grep -A 10 "ko_config:" "build-config.yaml" | grep "import_path:" | cut -d':' -f2- | sed 's/#.*//' | tr -d ' ')
        KO_BASE_IMAGE=$(grep -A 10 "ko_config:" "build-config.yaml" | grep "base_image:" | cut -d':' -f2- | sed 's/#.*//' | tr -d ' ')
        PLATFORMS=$(grep -A 10 "^platforms:" "build-config.yaml" | grep "linux/" | tr '\n' ',' | sed 's/,$//')
        
        echo "📁 Import path: $KO_IMPORT_PATH"
        echo "🐳 Base image: $KO_BASE_IMAGE"
        echo "🏗️  Platforms: $PLATFORMS"
        
        # Set Ko environment
        export KO_DOCKER_REPO="${{ env.IMAGE_BASE }}"
        export KO_DEFAULTBASEIMAGE="$KO_BASE_IMAGE"
        
        # Build timestamp for performance measurement
        START_TIME=$(date +%s)
        
        # Build with Ko - native multi-arch in single command!
        TAG="ko-dogfood-$(date +%Y%m%d)-${{ github.run_number }}"
        echo "🏷️  Building tag: $TAG"
        
        ko build "$KO_IMPORT_PATH" \
          --platform="$PLATFORMS" \
          --tags="$TAG" \
          --tags="ko-dogfood-latest"
        
        END_TIME=$(date +%s)
        BUILD_DURATION=$((END_TIME - START_TIME))
        
        echo ""
        echo "✅ Ko Backend Dogfood Build Complete!"
        echo "   🎯 Image: ${{ env.IMAGE_BASE }}:$TAG"
        echo "   🎯 Latest: ${{ env.IMAGE_BASE }}:ko-dogfood-latest"
        echo "   ⚡ Build time: ${BUILD_DURATION} seconds"
        echo "   🏗️  Multi-arch: $PLATFORMS"
        echo "   📦 Single job built multiple architectures!"
    
    - name: Test image functionality
      run: |
        echo "🧪 Testing built image functionality..."
        
        # Pull and inspect the image
        docker pull ${{ env.IMAGE_BASE }}:ko-dogfood-latest
        
        # Run a quick test
        echo "🚀 Running Ko demo application test..."
        docker run --rm -d --name ko-test -p 8080:8080 ${{ env.IMAGE_BASE }}:ko-dogfood-latest &
        
        # Wait for startup
        sleep 5
        
        # Test the application
        if curl -f http://localhost:8080/health; then
          echo "✅ Ko demo application is responding correctly!"
        else
          echo "❌ Ko demo application test failed"
          exit 1
        fi
        
        # Clean up
        docker stop ko-test || true
    
    - name: Performance summary
      run: |
        echo ""
        echo "🎯 Hephy-Builder Ko Backend Dogfood Summary"
        echo "=========================================="
        echo ""
        echo "✅ Successfully built hephy-builder Ko demo using Ko backend"
        echo "✅ Native multi-arch build in single job"
        echo "✅ Image functionality verified"
        echo ""
        echo "🚀 Ko Backend Benefits Demonstrated:"
        echo "   ⚡ Single job vs matrix builds (simplified workflow)"
        echo "   📦 Multi-arch native support (no manifest stitching)"
        echo "   🔒 Distroless base image (enhanced security)"
        echo "   📦 Optimized Go binary (smaller image size)"
        echo ""
        echo "🎉 Dogfood test successful - hephy-builder builds itself!"