# hephy-builder: Test Application Build Configuration
# Real-world Go HTTP server demonstrating remote repository capabilities  
# VALIDATION TARGET: Proves hephy-builder foundation for Ko backend integration

# Remote repository configuration (GitHub integration)
upstream_repo: https://github.com/spkane/scratch-helloworld.git
upstream_ref: main

# Path to Dockerfile relative to repository root
dockerfile_path: Dockerfile

# Build context path (defaults to .)
context_path: .

# Architectures to build
platforms:
  - linux/amd64
  - linux/arm64

# Tags to apply
additional_tags:
  - latest
#  - pipeline-test
